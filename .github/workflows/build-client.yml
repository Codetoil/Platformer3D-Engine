name: Build for Web

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  client:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
      # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Install NPM Packages (Server)
        run: npm install
      - name: Install NPM Packages (Client)
        run: npm install
        working-directory: client
      - name: Build Client
        run: npm run build-client
        working-directory: client
      - name: Create source code tarbell
        run: git archive -o client/dist/source.tar.gz HEAD
      - name: Copy License to output dist
        run: cp LICENSE.md client/dist/
      - name: Upload Output
        uses: actions/upload-artifact@v7
        with:
          name: client
          path: client/dist